<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>CA Study Tracker — Premium Study Productivity</title>
<meta name="description" content="All-in-one study tracker for CA, CMA, CS and competitive exam aspirants."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* =========================================================
   CA STUDY TRACKER  —  Single-file premium web app
   ========================================================= */
:root{
  --bg:#08070d;
  --bg-2:#0d0b18;
  --panel:rgba(255,255,255,0.04);
  --panel-2:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.09);
  --border-2:rgba(255,255,255,0.14);
  --text:#f4f3ff;
  --muted:#9a9ab5;
  --accent:#a855f7;
  --accent-2:#22d3ee;
  --accent-3:#f472b6;
  --success:#4ade80;
  --warn:#fbbf24;
  --danger:#f87171;
  --grad: linear-gradient(135deg,#a855f7 0%,#ec4899 45%,#22d3ee 100%);
  --grad-soft: linear-gradient(135deg, rgba(168,85,247,.25), rgba(34,211,238,.2));
  --glow: 0 0 30px rgba(168,85,247,.35), 0 0 60px rgba(34,211,238,.15);
  --radius: 18px;
  --radius-sm: 12px;
  --fs: 15px;
}
[data-theme="light"]{
  --bg:#f6f5ff; --bg-2:#ececff;
  --panel:rgba(20,10,40,0.04); --panel-2:rgba(20,10,40,0.07);
  --border:rgba(20,10,40,0.09); --border-2:rgba(20,10,40,0.18);
  --text:#12111a; --muted:#5b5a75;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:var(--fs);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif;margin:0;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;color:inherit}
a{color:inherit;text-decoration:none}

/* Animated background */
body::before{
  content:"";position:fixed;inset:-20%;z-index:-2;
  background:
    radial-gradient(circle at 20% 20%, rgba(168,85,247,.25), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(34,211,238,.18), transparent 45%),
    radial-gradient(circle at 50% 90%, rgba(236,72,153,.18), transparent 45%);
  filter:blur(60px);
  animation: floaty 18s ease-in-out infinite alternate;
}
body::after{
  content:"";position:fixed;inset:0;z-index:-1;
  background:linear-gradient(180deg,var(--bg) 0%,var(--bg-2) 100%);
  opacity:.7;
}
@keyframes floaty{
  0%{transform:translate(0,0) scale(1)}
  100%{transform:translate(3%,-2%) scale(1.05)}
}

/* Layout */
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.sidebar{
  position:sticky;top:0;height:100vh;
  padding:22px 16px;
  border-right:1px solid var(--border);
  background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0));
  backdrop-filter:blur(14px);
  overflow-y:auto;
}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:26px;padding:0 6px}
.brand-mark{
  width:38px;height:38px;border-radius:12px;
  background:var(--grad);display:grid;place-items:center;font-weight:700;
  box-shadow:var(--glow);
}
.brand-mark span{font-family:'Space Grotesk';color:#fff;font-size:18px}
.brand-name{font-family:'Space Grotesk';font-weight:700;font-size:16px;line-height:1.1}
.brand-sub{font-size:11px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase}
.nav{display:flex;flex-direction:column;gap:2px}
.nav button{
  display:flex;align-items:center;gap:12px;
  padding:11px 12px;border-radius:12px;
  color:var(--muted);font-size:14px;font-weight:500;
  text-align:left;transition:.2s;
}
.nav button:hover{background:var(--panel);color:var(--text)}
.nav button.active{
  background:var(--grad-soft);
  color:var(--text);
  box-shadow:inset 0 0 0 1px var(--border-2);
}
.nav button .ico{width:18px;height:18px;display:inline-grid;place-items:center;font-size:16px}

.main{padding:26px 32px 120px;min-width:0}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.topbar h1{font-size:26px;font-weight:700;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.topbar .sub{color:var(--muted);font-size:13px;margin-top:2px}
.top-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

/* Card / Glass */
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  position:relative;
  overflow:hidden;
  transition:.25s;
}
.card:hover{border-color:var(--border-2);transform:translateY(-2px)}
.card h3{font-size:15px;font-weight:600;margin-bottom:4px}
.card .lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.14em}
.big{font-size:32px;font-weight:700;font-family:'Space Grotesk';margin-top:6px}
.big.grad{background:var(--grad);-webkit-background-clip:text;color:transparent}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 16px;border-radius:12px;
  background:var(--panel-2);border:1px solid var(--border);
  font-size:14px;font-weight:500;transition:.2s;
}
.btn:hover{border-color:var(--border-2);background:var(--panel)}
.btn.primary{background:var(--grad);color:#fff;border:none;box-shadow:0 8px 24px rgba(168,85,247,.35)}
.btn.primary:hover{transform:translateY(-1px);filter:brightness(1.05)}
.btn.ghost{background:transparent}
.btn.danger{background:rgba(248,113,113,.12);color:#fca5a5;border-color:rgba(248,113,113,.3)}
.btn.sm{padding:6px 10px;font-size:12px;border-radius:8px}
.chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11px;background:var(--panel-2);border:1px solid var(--border);color:var(--muted)}
.chip.on{background:var(--grad);color:#fff;border:none}

/* Grid */
.grid{display:grid;gap:16px}
.g-4{grid-template-columns:repeat(4,1fr)}
.g-3{grid-template-columns:repeat(3,1fr)}
.g-2{grid-template-columns:repeat(2,1fr)}
@media(max-width:1100px){.g-4{grid-template-columns:repeat(2,1fr)}.g-3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.g-4,.g-3,.g-2{grid-template-columns:1fr}}

/* Form */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.field label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em}
.input, .select, .textarea{
  width:100%;padding:11px 14px;border-radius:12px;
  background:var(--panel);border:1px solid var(--border);
  font-size:14px;color:var(--text);outline:none;transition:.2s;
}
.input:focus,.select:focus,.textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(168,85,247,.15)}
.textarea{min-height:80px;resize:vertical}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row .field{flex:1;min-width:130px}

/* Progress */
.progress{height:8px;background:var(--panel-2);border-radius:99px;overflow:hidden;position:relative}
.progress > i{display:block;height:100%;background:var(--grad);border-radius:99px;transition:.6s cubic-bezier(.4,0,.2,1);box-shadow:0 0 12px rgba(168,85,247,.6)}

/* List */
.list{display:flex;flex-direction:column;gap:10px}
.item{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:14px;border-radius:14px;background:var(--panel);border:1px solid var(--border);
  transition:.2s;
}
.item:hover{border-color:var(--border-2)}
.item .meta{color:var(--muted);font-size:12px}
.tag{display:inline-block;width:10px;height:10px;border-radius:50%}

/* Modal */
.modal-back{
  position:fixed;inset:0;background:rgba(4,3,10,.65);backdrop-filter:blur(6px);
  display:none;place-items:center;z-index:80;padding:20px;
}
.modal-back.on{display:grid;animation:fadeIn .2s ease}
.modal{
  width:min(500px,100%);background:var(--bg-2);
  border:1px solid var(--border-2);border-radius:20px;padding:24px;
  box-shadow:0 40px 80px rgba(0,0,0,.4), var(--glow);
  animation:pop .25s cubic-bezier(.34,1.56,.64,1);
  max-height:90vh;overflow-y:auto;
}
.modal h3{font-size:19px;margin-bottom:14px}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Toast */
.toast-wrap{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:200}
.toast{
  padding:12px 16px;border-radius:12px;
  background:var(--bg-2);border:1px solid var(--border-2);
  box-shadow:0 20px 40px rgba(0,0,0,.4);
  font-size:14px;animation:slideIn .3s ease;
  min-width:220px;
}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Mobile nav */
.mobile-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:60;
  background:rgba(13,11,24,.9);backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  padding:10px 8px calc(10px + env(safe-area-inset-bottom));
  justify-content:space-around;
}
.mobile-nav button{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px;color:var(--muted);font-size:10px;
}
.mobile-nav button.active{color:var(--text)}
.mobile-nav button.active .ico{background:var(--grad);color:#fff;box-shadow:var(--glow)}
.mobile-nav .ico{width:32px;height:32px;border-radius:10px;display:grid;place-items:center;font-size:16px;background:var(--panel);transition:.2s}
.mobile-menu-btn{display:none}

@media(max-width:900px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .main{padding:18px 16px 100px}
  .mobile-nav{display:flex}
  .mobile-menu-btn{display:inline-flex}
  .topbar h1{font-size:22px}
  .big{font-size:26px}
}

/* Section */
.section{display:none;animation:sec .4s cubic-bezier(.2,.9,.3,1)}
.section.on{display:block}
@keyframes sec{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.section-head h2{font-size:19px}

/* Streak flame */
.flame{display:inline-block;font-size:20px;animation:flick 1.2s infinite alternate}
@keyframes flick{from{transform:scale(1) rotate(-3deg)}to{transform:scale(1.1) rotate(3deg)}}

/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .em{font-size:48px;margin-bottom:10px;opacity:.6}

/* Heatmap */
.heat{display:grid;grid-template-columns:repeat(auto-fit,minmax(14px,1fr));gap:3px}
.heat .c{aspect-ratio:1;background:var(--panel);border-radius:3px;transition:.2s;cursor:pointer}
.heat .c[data-l="1"]{background:rgba(168,85,247,.25)}
.heat .c[data-l="2"]{background:rgba(168,85,247,.5)}
.heat .c[data-l="3"]{background:rgba(168,85,247,.75)}
.heat .c[data-l="4"]{background:var(--accent);box-shadow:0 0 8px var(--accent)}

/* Bar chart */
.bars{display:flex;gap:6px;align-items:flex-end;height:140px;padding:8px 0}
.bars .b{flex:1;background:var(--grad);border-radius:6px 6px 0 0;min-height:4px;position:relative;transition:.5s}
.bars .b::after{content:attr(data-l);position:absolute;bottom:-20px;left:0;right:0;text-align:center;font-size:10px;color:var(--muted)}

/* Pomodoro */
.pomo{
  text-align:center;padding:40px 20px;
  background:radial-gradient(circle at center, rgba(168,85,247,.15), transparent 70%);
  border-radius:24px;
}
.pomo-time{font-size:72px;font-family:'Space Grotesk';font-weight:700;background:var(--grad);-webkit-background-clip:text;color:transparent;letter-spacing:-.03em}
.pomo-ring{
  width:220px;height:220px;margin:20px auto;position:relative;
  border-radius:50%;
  background:conic-gradient(var(--accent) var(--p,0%), var(--panel) 0);
  display:grid;place-items:center;
  box-shadow:0 0 60px rgba(168,85,247,.25);
}
.pomo-ring::before{content:"";position:absolute;inset:12px;border-radius:50%;background:var(--bg-2)}
.pomo-ring .inner{position:relative;font-size:36px;font-family:'Space Grotesk';font-weight:700}

/* Confetti */
.confetti{position:fixed;inset:0;pointer-events:none;z-index:300;overflow:hidden}
.confetti span{position:absolute;width:10px;height:14px;top:-20px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg)}}

/* Habit dots */
.habit-week{display:flex;gap:5px}
.habit-week .d{width:22px;height:22px;border-radius:6px;background:var(--panel-2);display:grid;place-items:center;font-size:10px;color:var(--muted);cursor:pointer;transition:.2s}
.habit-week .d.on{background:var(--grad);color:#fff;box-shadow:0 0 12px rgba(168,85,247,.5)}

/* Utility */
.flex{display:flex}
.between{justify-content:space-between}
.center{align-items:center}
.gap-8{gap:8px}.gap-12{gap:12px}
.mt-8{margin-top:8px}.mt-16{margin-top:16px}.mt-24{margin-top:24px}
.mb-8{margin-bottom:8px}.mb-16{margin-bottom:16px}
.muted{color:var(--muted)}
.small{font-size:12px}
.footer{margin-top:40px;text-align:center;color:var(--muted);font-size:12px;padding:20px}
.footer .grad{background:var(--grad);-webkit-background-clip:text;color:transparent;font-weight:600}

/* Scroll */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:var(--panel-2);border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:var(--border-2)}

/* Focus mode */
.focus-mode{
  position:fixed;inset:0;background:linear-gradient(180deg,#050409,#0a0716);z-index:400;
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:20px;
}
.focus-mode.on{display:flex;animation:fadeIn .3s}
.focus-mode .quote{max-width:600px;text-align:center;font-family:'Space Grotesk';font-size:22px;line-height:1.4;color:var(--muted)}
.focus-mode .exit{position:absolute;top:20px;right:20px}

/* Achievement badge */
.badge{
  display:inline-flex;flex-direction:column;align-items:center;gap:6px;padding:16px;
  background:var(--panel);border:1px solid var(--border);border-radius:16px;text-align:center;
  transition:.3s;
}
.badge.earned{border-color:var(--border-2);background:var(--grad-soft);box-shadow:var(--glow)}
.badge .em{font-size:36px;filter:grayscale(1);opacity:.4;transition:.3s}
.badge.earned .em{filter:none;opacity:1;animation:pulse 2s infinite}
@keyframes pulse{50%{transform:scale(1.1)}}
.badge .n{font-weight:600;font-size:13px}
.badge .d{font-size:11px;color:var(--muted)}
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark"><span>CA</span></div>
      <div>
        <div class="brand-name">Study Tracker</div>
        <div class="brand-sub">Level up daily</div>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div>
        <h1 id="page-title">Dashboard</h1>
        <div class="sub" id="page-sub">Welcome back — let's make today count.</div>
      </div>
      <div class="top-actions">
        <button class="btn ghost" id="focus-btn" title="Focus Mode">🎯 Focus</button>
        <button class="btn ghost" id="theme-btn" title="Toggle theme">🌗</button>
        <button class="btn primary" id="quick-add">＋ Quick Add</button>
      </div>
    </div>

    <div id="sections"></div>

    <div class="footer">Created by <span class="grad">Vasu Gupta</span></div>
  </main>
</div>

<!-- Mobile nav -->
<nav class="mobile-nav" id="mnav"></nav>

<!-- Modal -->
<div class="modal-back" id="modal-back">
  <div class="modal" id="modal"></div>
</div>

<!-- Toast -->
<div class="toast-wrap" id="toasts"></div>

<!-- Focus mode -->
<div class="focus-mode" id="focus">
  <button class="btn exit" onclick="toggleFocus()">✕ Exit</button>
  <div class="pomo-time" id="focus-clock">00:00</div>
  <div class="quote" id="focus-quote">"The expert in anything was once a beginner."</div>
  <div class="flex gap-12">
    <button class="btn" onclick="ambient('rain')">🌧️ Rain</button>
    <button class="btn" onclick="ambient('lofi')">🎧 Lo-fi</button>
    <button class="btn" onclick="ambient('off')">🔇 Silent</button>
  </div>
  <div class="small muted">Distraction blocker: ON · Notifications muted</div>
</div>

<script>
/* =========================================================
   STATE + STORAGE
   ========================================================= */
const LS_KEY = "castudy_v1";
const state = load();

function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw) return {...defaults(), ...JSON.parse(raw)};
  }catch(e){}
  return defaults();
}
function defaults(){
  return {
    subjects: [
      {id:uid(),name:"Accounts",color:"#a855f7",progress:0},
      {id:uid(),name:"Law",color:"#22d3ee",progress:0},
      {id:uid(),name:"Taxation",color:"#f472b6",progress:0},
    ],
    sessions: [],       // {id,date,subjectId,start,end,hours,notes}
    goals: [],          // {id,text,type,done,created}
    habits: [
      {id:uid(),name:"Wake up early",log:{}},
      {id:uid(),name:"Exercise",log:{}},
      {id:uid(),name:"Meditation",log:{}},
      {id:uid(),name:"Reading",log:{}},
      {id:uid(),name:"No procrastination",log:{}},
      {id:uid(),name:"Water intake (3L)",log:{}},
    ],
    exams: [],          // {id,name,date}
    revisions: [],      // {id,topic,subjectId,r1,r2,r3,rf}
    mocks: [],          // {id,date,subjectId,scored,total}
    chapters: [],       // {id,name,subjectId,done,difficulty,pending}
    notes: [],          // {id,title,body,created}
    planner: {},        // {date: [items]}
    settings: {
      theme:"dark", accent:"#a855f7", font:15,
    },
    streak: {current:0,longest:0,lastDate:null},
    achievements: {},
  };
}
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
function uid(){ return Math.random().toString(36).slice(2,10) }
function today(){ return new Date().toISOString().slice(0,10) }
function fmtDate(d){ return new Date(d).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}) }

/* =========================================================
   ROUTES / NAV
   ========================================================= */
const routes = [
  {id:"dashboard", label:"Dashboard", ico:"🏠", render:renderDashboard},
  {id:"subjects", label:"Subjects", ico:"📚", render:renderSubjects},
  {id:"sessions", label:"Study Log", ico:"⏱️", render:renderSessions},
  {id:"pomodoro", label:"Pomodoro", ico:"🍅", render:renderPomodoro},
  {id:"goals", label:"Goals", ico:"🎯", render:renderGoals},
  {id:"streak", label:"Streaks", ico:"🔥", render:renderStreak},
  {id:"exams", label:"Exams", ico:"📅", render:renderExams},
  {id:"revisions", label:"Revisions", ico:"🔁", render:renderRevisions},
  {id:"mocks", label:"Mock Tests", ico:"📝", render:renderMocks},
  {id:"chapters", label:"Chapters", ico:"📖", render:renderChapters},
  {id:"habits", label:"Habits", ico:"✨", render:renderHabits},
  {id:"analytics", label:"Analytics", ico:"📊", render:renderAnalytics},
  {id:"achievements", label:"Achievements", ico:"🏆", render:renderAchievements},
  {id:"notes", label:"Notes", ico:"🗒️", render:renderNotes},
  {id:"planner", label:"Planner", ico:"🗓️", render:renderPlanner},
  {id:"motivation", label:"Motivation", ico:"⚡", render:renderMotivation},
  {id:"settings", label:"Settings", ico:"⚙️", render:renderSettings},
];
const mobRoutes = ["dashboard","sessions","pomodoro","analytics","settings"];

let current = "dashboard";
function nav(id){
  current = id;
  document.querySelectorAll("#nav button, #mnav button").forEach(b=>b.classList.toggle("active", b.dataset.id===id));
  const r = routes.find(x=>x.id===id);
  document.getElementById("page-title").textContent = r.label;
  document.getElementById("page-sub").textContent = subLine(id);
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}
function subLine(id){
  const map = {
    dashboard:"Welcome back — let's make today count.",
    subjects:"Organize your syllabus by subject.",
    sessions:"Log every study session.",
    pomodoro:"Deep work in focused bursts.",
    goals:"Small wins compound.",
    streak:"Consistency beats intensity.",
    exams:"Countdown to the big day.",
    revisions:"Revise. Retain. Repeat.",
    mocks:"Test yourself under pressure.",
    chapters:"Track chapter completion.",
    habits:"Build the identity of a topper.",
    analytics:"Data-driven preparation.",
    achievements:"Earn your badges.",
    notes:"Quick reference notes.",
    planner:"Plan the week ahead.",
    motivation:"Fuel for the grind.",
    settings:"Make it yours.",
  };

/* =========================================================
   HELPERS: analytics
   ========================================================= */
function hoursOn(date){
  return state.sessions.filter(s=>s.date===date).reduce((a,b)=>a+b.hours,0);
}
function hoursRange(days){
  const now = new Date();
  let total=0;
  for(let i=0;i<days;i++){
    const d = new Date(now); d.setDate(d.getDate()-i);
    total += hoursOn(d.toISOString().slice(0,10));
  }
  return total;
}
function productivityScore(){
  const h = hoursOn(today());
  const goalDone = state.goals.filter(g=>g.done && sameDay(g.created)).length;
  const habitDone = state.habits.filter(h=>h.log[today()]).length;
  const score = Math.min(100, Math.round(h*10 + goalDone*8 + habitDone*4));
  return score;
}
function sameDay(ts){ return new Date(ts).toISOString().slice(0,10)===today() }

function updateStreak(){
  const t = today();
  if(hoursOn(t) <= 0) return;
  if(state.streak.lastDate === t) return;
  const yst = new Date(); yst.setDate(yst.getDate()-1);
  const ystStr = yst.toISOString().slice(0,10);
  if(state.streak.lastDate === ystStr){
    state.streak.current += 1;
  } else {
    state.streak.current = 1;
  }
  state.streak.longest = Math.max(state.streak.longest, state.streak.current);
  state.streak.lastDate = t;
  save();
}

   ========================================================= */
let pomo = {running:false, seconds:25*60, total:25*60, mode:"25/5", phase:"work", timer:null};
function renderPomodoro(el){
  el.innerHTML = `
    <div class="pomo card">
      <div class="flex gap-8" style="justify-content:center;margin-bottom:16px;flex-wrap:wrap">
        <button class="chip ${pomo.mode==='25/5'?'on':''}" onclick="pomoMode('25/5',25,5)">25 / 5</button>
        <button class="chip ${pomo.mode==='50/10'?'on':''}" onclick="pomoMode('50/10',50,10)">50 / 10</button>
        <button class="chip ${pomo.mode==='custom'?'on':''}" onclick="pomoCustom()">Custom</button>
      </div>
      <div class="pomo-ring" id="pring"><div class="inner" id="ptime">${fmtTime(pomo.seconds)}</div></div>
      <div class="lbl">${pomo.phase==='work'?'Focus':'Break'} Session</div>
      <div class="flex gap-8" style="justify-content:center;margin-top:20px">
        <button class="btn primary" id="pstart" onclick="pomoToggle()">${pomo.running?'⏸ Pause':'▶ Start'}</button>
        <button class="btn" onclick="pomoReset()">↺ Reset</button>
      </div>
    </div>
  `;
  updatePomoUI();
}
function fmtTime(s){ const m=Math.floor(s/60),ss=s%60; return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}` }
function pomoMode(name,w,b){ pomo.mode=name; pomo.workM=w; pomo.breakM=b; pomo.seconds=w*60; pomo.total=w*60; pomo.phase='work'; pomo.running=false; clearInterval(pomo.timer); render(); }
function pomoCustom(){
  const w = +prompt("Work minutes",45)||45;
  const b = +prompt("Break minutes",10)||10;
  pomoMode("custom",w,b);
}
function pomoToggle(){
  if(pomo.running){ pomo.running=false; clearInterval(pomo.timer); }
  else{
    pomo.running=true;
    pomo.timer=setInterval(()=>{
      pomo.seconds--;
      if(pomo.seconds<=0){
        clearInterval(pomo.timer); pomo.running=false;
        notify(pomo.phase==='work'?"Focus complete! Take a break 🎉":"Break over, back to focus!");
        pomo.phase = pomo.phase==='work'?'break':'work';
        const m = pomo.phase==='work'?(pomo.workM||25):(pomo.breakM||5);
        pomo.seconds=m*60; pomo.total=m*60;
        celebrate();
      }
      updatePomoUI();
    },1000);
  }
  const btn = document.getElementById("pstart");
  if(btn) btn.textContent = pomo.running?'⏸ Pause':'▶ Start';
}
function pomoReset(){
  clearInterval(pomo.timer); pomo.running=false;
  const m = pomo.phase==='work'?(pomo.workM||25):(pomo.breakM||5);
  pomo.seconds=m*60; pomo.total=m*60; updatePomoUI();
  const btn = document.getElementById("pstart"); if(btn) btn.textContent = '▶ Start';
}
function updatePomoUI(){
  const t = document.getElementById("ptime"); if(t) t.textContent = fmtTime(pomo.seconds);
  const ring = document.getElementById("pring");
  if(ring){ const pct = (1 - pomo.seconds/pomo.total)*100; ring.style.setProperty("--p", pct+"%"); }
  const fc = document.getElementById("focus-clock"); if(fc) fc.textContent = fmtTime(pomo.seconds);
}

   PLANNER
   ========================================================= */
let plannerView = "week";
function renderPlanner(el){
  el.innerHTML = `
    <div class="section-head">
      <h2>Planner</h2>
      <div class="flex gap-8">
        ${['day','week','month'].map(v=>`<button class="chip ${plannerView===v?'on':''}" onclick="plannerView='${v}';render()">${v}</button>`).join("")}
      </div>
    </div>
    <div id="pl-grid"></div>
  `;
  const days = plannerView==='day'?1:plannerView==='week'?7:30;
  const start = new Date();
  const items=[];
  for(let i=0;i<days;i++){
    const d = new Date(start); d.setDate(d.getDate()+i);
    const ds = d.toISOString().slice(0,10);
    const tasks = state.planner[ds]||[];
    items.push(`<div class="card mb-16">
      <div class="flex between center mb-16">
        <div><b>${d.toLocaleDateString(undefined,{weekday:'long', month:'short',day:'numeric'})}</b>
          <div class="small muted">${tasks.length} tasks</div></div>
        <button class="btn sm" onclick="addPlanner('${ds}')">＋ Add</button>
      </div>
      ${tasks.length?tasks.map((t,i)=>`
        <div class="item">
          <label class="flex center gap-8" style="cursor:pointer">
            <input type="checkbox" ${t.done?'checked':''} onchange="togglePl('${ds}',${i})"/>
            <span style="${t.done?'text-decoration:line-through;color:var(--muted)':''}">${escapeHtml(t.text)}</span>
          </label>
          <button class="btn sm danger" onclick="delPl('${ds}',${i})">✕</button>
        </div>
      `).join(""):`<div class="empty small">Nothing planned</div>`}
    </div>`);
  }
  document.getElementById("pl-grid").innerHTML = items.join("");
}
function addPlanner(ds){
  const t = prompt("Task"); if(!t) return;
  state.planner[ds] = state.planner[ds]||[];
  state.planner[ds].push({text:t,done:false});
  save();render();
}
function togglePl(ds,i){ state.planner[ds][i].done=!state.planner[ds][i].done; save();render(); if(state.planner[ds][i].done)celebrate(); }
function delPl(ds,i){ state.planner[ds].splice(i,1); save();render(); }

function weeklyInsight(){
  const wk = hoursRange(7);
  const prev = hoursRange(14)-wk;
  const diff = wk-prev;
  if(state.sessions.length===0) return "Log your first session to unlock insights.";
  if(diff>0) return `📈 You studied ${diff.toFixed(1)}h more this week than last week. Momentum is building!`;
  if(diff<0) return `📉 You're down ${Math.abs(diff).toFixed(1)}h vs last week. One session today puts you back on track.`;
  return `📊 You matched last week's pace. Push for +1h this week.`;
}

        <div class="field"><label>Accent Color</label>
          <input type="color" class="input" value="${s.accent}" onchange="setAccent(this.value)"/>
        </div>
        <div class="field"><label>Font Size (${s.font}px)</label>
          <input type="range" min="12" max="18" value="${s.font}" oninput="setFont(this.value)" style="width:100%"/>
        </div>
      </div>
      <div class="card">
        <h3 class="mb-16">Backup & Restore</h3>
        <div class="flex gap-8" style="flex-wrap:wrap">
          <button class="btn" onclick="exportData()">💾 Export/Backup</button>
          <button class="btn" onclick="importData()">📥 Import</button>
          <button class="btn danger" onclick="wipeData()">🗑️ Reset All</button>
        </div>
        <div class="small muted mt-16">All your data is stored locally in your browser. Export a backup regularly.</div>
      </div>
    </div>
  `;
}
function setTheme(t){ state.settings.theme=t; save(); applySettings(); render(); }
function setAccent(c){ state.settings.accent=c; save(); applySettings(); }
function setFont(v){ state.settings.font=+v; save(); applySettings(); }
function applySettings(){
  const s = state.settings;
  document.documentElement.setAttribute("data-theme", s.theme==='light'?'light':'dark');
  document.documentElement.style.setProperty("--accent", s.accent);
  document.documentElement.style.setProperty("--fs", s.font+"px");
  const gradient = `linear-gradient(135deg, ${s.accent} 0%, #ec4899 45%, #22d3ee 100%)`;
  document.documentElement.style.setProperty("--grad", gradient);
}
function exportData(){
  const backup = {};
  for(let i=0;i<localStorage.length;i++){
    const key = localStorage.key(i);
    backup[key] = localStorage.getItem(key);
  }
  const blob = new Blob([JSON.stringify(backup,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `ca-study-tracker-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast("Backup downloaded");
}
function importData(){
  const inp = document.createElement("input"); inp.type="file"; inp.accept="application/json";
  inp.onchange = e=>{
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = ()=>{ try{
      const data = JSON.parse(r.result);
      if(data && typeof data==="object" && LS_KEY in data){
        for(const key in data) localStorage.setItem(key, data[key]);
        Object.assign(state, load());
      } else {
        Object.assign(state, data);
        save();
      }
      applySettings();
      render();
      toast("Backup restored");
    }catch(err){ toast("Invalid file"); console.error(err); } };
    r.readAsText(f);
  };
  inp.click();
}
function wipeData(){
  if(!confirm("Erase all data? This cannot be undone.")) return;
  localStorage.removeItem(LS_KEY);
  location.reload();
}

/* =========================================================
   MISC: modal, toast, confetti, focus, quick-add
   ========================================================= */
function openModal(html){ document.getElementById("modal").innerHTML=html; document.getElementById("modal-back").classList.add("on"); }
function closeModal(){ document.getElementById("modal-back").classList.remove("on"); }
document.getElementById("modal-back").addEventListener("click",e=>{ if(e.target.id==="modal-back") closeModal(); });

function toast(msg){
  const el = document.createElement("div"); el.className="toast"; el.textContent=msg;
  document.getElementById("toasts").appendChild(el);
  setTimeout(()=>{ el.style.animation="slideIn .3s reverse"; setTimeout(()=>el.remove(),300); }, 2600);
}

function celebrate(){
  const wrap = document.createElement("div"); wrap.className="confetti";
  const colors = ["#a855f7","#22d3ee","#f472b6","#4ade80","#fbbf24"];
  for(let i=0;i<60;i++){
    const s = document.createElement("span");
    s.style.left = Math.random()*100+"%";
    s.style.background = colors[i%colors.length];
    s.style.animationDuration = (1.5+Math.random()*1.5)+"s";
    s.style.animationDelay = (Math.random()*0.3)+"s";
    s.style.borderRadius = Math.random()<0.5?"50%":"2px";
    wrap.appendChild(s);
  }
  document.body.appendChild(wrap);
  setTimeout(()=>wrap.remove(),3200);
}

function notify(msg){
  toast(msg);
  if("Notification" in window){
    if(Notification.permission==="granted") new Notification("CA Study Tracker",{body:msg});
    else if(Notification.permission!=="denied") Notification.requestPermission();
  }
}

function toggleFocus(){ document.getElementById("focus").classList.toggle("on"); }
document.getElementById("focus-btn").onclick = toggleFocus;
let ambientAudio = null;
function ambient(kind){
  if(ambientAudio){ ambientAudio.pause(); ambientAudio=null; }
  if(kind==='off') return;
  toast(kind==='rain'?"🌧️ Rain sounds (imagine it)":"🎧 Lo-fi (imagine it)");
}

document.getElementById("theme-btn").onclick = ()=>{
  state.settings.theme = state.settings.theme==='dark'?'light':'dark';
  save(); applySettings();
};
document.getElementById("quick-add").onclick = ()=>{
  openModal(`
    <h3>Quick Add</h3>
    <div class="grid g-2" style="gap:10px">
      <button class="btn" onclick="closeModal();sessionModal()">⏱️ Log Session</button>
      <button class="btn" onclick="closeModal();goalModal()">🎯 Add Goal</button>
      <button class="btn" onclick="closeModal();subjectModal()">📚 Add Subject</button>
      <button class="btn" onclick="closeModal();noteModal()">🗒️ New Note</button>
      <button class="btn" onclick="closeModal();examModal()">📅 Add Exam</button>
      <button class="btn" onclick="closeModal();mockModal()">📝 Add Mock</button>
    </div>
  `);
};

function escapeHtml(s){ return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])) }

/* =========================================================
   INIT
   ========================================================= */
applySettings();
buildNav();
updateStreak();
checkAchievements();
nav("dashboard");

// Reminder every 4 hours
setInterval(()=>{
  if(hoursOn(today())<2) toast("💡 Reminder: log a study session today!");
}, 4*60*60*1000);
</script>
